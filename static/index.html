<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello Symphony</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f4f5f7;
      color: #172b4d;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #0052cc;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.2rem; font-weight: 600; }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .home-content {
      text-align: center;
      color: #6b778c;
    }

    .home-content h2 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #172b4d;
      margin-bottom: 8px;
    }

    .home-content p {
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

<header>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
  <h1>Hello Symphony</h1>
</header>

<main>
  <div class="home-content">
    <h2>Accueil</h2>
    <p>Bienvenue sur Hello Symphony.</p>
  </div>
</main>

</body>
</html>
