<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello Symphony</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f4f5f7;
      color: #172b4d;
      min-height: 100vh;
    }

    header {
      background: #0052cc;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.2rem; font-weight: 600; }

    .search-bar {
      padding: 20px 24px 0;
      max-width: 480px;
    }
    .search-bar input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #dfe1e6;
      border-radius: 6px;
      font-size: 0.95rem;
      outline: none;
    }
    .search-bar input:focus { border-color: #0052cc; box-shadow: 0 0 0 2px #4c9aff40; }

    /* ── Client list ── */
    #client-view { padding: 20px 24px; }

    .clients-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }

    .client-card {
      background: #fff;
      border: 1px solid #dfe1e6;
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: box-shadow .15s, border-color .15s;
    }
    .client-card:hover {
      border-color: #0052cc;
      box-shadow: 0 2px 8px #0052cc22;
    }
    .client-card h3 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .client-card p {
      font-size: 0.8rem;
      color: #6b778c;
    }

    /* ── Task panel ── */
    #task-view { display: none; padding: 20px 24px; }

    .back-btn {
      background: none;
      border: none;
      color: #0052cc;
      font-size: 0.9rem;
      cursor: pointer;
      padding: 0;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .back-btn:hover { text-decoration: underline; }

    #task-view h2 {
      font-size: 1.1rem;
      margin-bottom: 4px;
    }
    #task-view .subtitle {
      font-size: 0.85rem;
      color: #6b778c;
      margin-bottom: 20px;
    }

    .tasks-list { display: flex; flex-direction: column; gap: 10px; }

    .task-card {
      background: #fff;
      border: 1px solid #dfe1e6;
      border-left: 4px solid #0052cc;
      border-radius: 6px;
      padding: 14px 16px;
    }
    .task-card.statut-TERMINE  { border-left-color: #36b37e; }
    .task-card.statut-EN_COURS { border-left-color: #ff991f; }
    .task-card.statut-A_FAIRE  { border-left-color: #0052cc; }
    .task-card.statut-ANNULE   { border-left-color: #97a0af; }

    .task-card h4 { font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; }
    .task-card .meta { font-size: 0.8rem; color: #6b778c; display: flex; flex-wrap: wrap; gap: 12px; margin-top: 6px; }
    .task-card .meta span { display: flex; align-items: center; gap: 4px; }

    .badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: .03em;
    }
    .badge-TERMINE  { background: #e3fcef; color: #006644; }
    .badge-EN_COURS { background: #fffae6; color: #974f0c; }
    .badge-A_FAIRE  { background: #deebff; color: #0747a6; }
    .badge-ANNULE   { background: #f4f5f7; color: #6b778c; }

    .empty-state {
      text-align: center;
      color: #6b778c;
      padding: 48px 0;
      font-size: 0.95rem;
    }

    .spinner {
      display: flex;
      justify-content: center;
      padding: 48px;
    }
    .spinner::after {
      content: '';
      width: 32px; height: 32px;
      border: 3px solid #dfe1e6;
      border-top-color: #0052cc;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: #ffebe6;
      border: 1px solid #ff5630;
      border-radius: 6px;
      padding: 12px 16px;
      color: #bf2600;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<header>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
  <h1>Hello Symphony</h1>
</header>

<!-- Client list view -->
<div id="client-view">
  <div class="search-bar">
    <input id="search" type="text" placeholder="Rechercher un client…" />
  </div>
  <div style="padding: 20px 0 8px; font-size: .85rem; color: #6b778c;" id="count-label"></div>
  <div id="clients-container"><div class="spinner"></div></div>
</div>

<!-- Task panel view -->
<div id="task-view">
  <button class="back-btn" id="back-btn">&#8592; Retour aux clients</button>
  <h2 id="task-client-name"></h2>
  <p class="subtitle" id="task-subtitle"></p>
  <div id="tasks-container"><div class="spinner"></div></div>
</div>

<script>
  const clientView = document.getElementById('client-view');
  const taskView   = document.getElementById('task-view');
  const clientsContainer = document.getElementById('clients-container');
  const tasksContainer   = document.getElementById('tasks-container');
  const searchInput  = document.getElementById('search');
  const countLabel   = document.getElementById('count-label');

  let allClients = [];

  // ── Helpers ──────────────────────────────────────────────────────────────

  function currentMonthLabel() {
    return new Date().toLocaleString('fr-FR', { month: 'long', year: 'numeric' });
  }

  function formatDate(iso) {
    if (!iso) return '?';
    return new Date(iso).toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' });
  }

  function badgeClass(statut) {
    const map = { 'TERMINE': 'TERMINE', 'EN_COURS': 'EN_COURS', 'A_FAIRE': 'A_FAIRE', 'ANNULE': 'ANNULE' };
    return map[statut] || 'A_FAIRE';
  }

  function badgeLabel(statut) {
    const map = { 'TERMINE': 'Terminé', 'EN_COURS': 'En cours', 'A_FAIRE': 'À faire', 'ANNULE': 'Annulé' };
    return map[statut] || statut || '—';
  }

  // ── Fetch clients ─────────────────────────────────────────────────────────

  async function loadClients() {
    try {
      const res = await fetch('/clients');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      allClients = await res.json();
      renderClients(allClients);
    } catch (err) {
      clientsContainer.innerHTML = `<p class="error-msg">Erreur lors du chargement des clients : ${err.message}</p>`;
    }
  }

  function renderClients(clients) {
    countLabel.textContent = `${clients.length} client${clients.length !== 1 ? 's' : ''}`;
    if (clients.length === 0) {
      clientsContainer.innerHTML = '<p class="empty-state">Aucun client trouvé.</p>';
      return;
    }
    const grid = document.createElement('div');
    grid.className = 'clients-grid';
    clients.forEach(c => {
      const card = document.createElement('div');
      card.className = 'client-card';
      card.innerHTML = `
        <h3>${esc(c.raison_sociale || '—')}</h3>
        <p>${esc(c.ville || '')}${c.code_postal ? ' <span style="opacity:.7">' + esc(c.code_postal) + '</span>' : ''}</p>
        <p style="margin-top:4px;font-size:.75rem;opacity:.5">${esc(c.numero_dossier || '')}</p>
      `;
      card.addEventListener('click', () => showTasks(c));
      grid.appendChild(card);
    });
    clientsContainer.innerHTML = '';
    clientsContainer.appendChild(grid);
  }

  // ── Search filter ─────────────────────────────────────────────────────────

  searchInput.addEventListener('input', () => {
    const term = searchInput.value.trim().toLowerCase();
    const filtered = term
      ? allClients.filter(c => (c.raison_sociale || '').toLowerCase().includes(term))
      : allClients;
    renderClients(filtered);
  });

  // ── Show tasks ────────────────────────────────────────────────────────────

  async function showTasks(client) {
    clientView.style.display = 'none';
    taskView.style.display = 'block';
    document.getElementById('task-client-name').textContent = client.raison_sociale || '—';
    document.getElementById('task-subtitle').textContent = `Tâches du mois de ${currentMonthLabel()}`;
    tasksContainer.innerHTML = '<div class="spinner"></div>';

    try {
      const res = await fetch(`/clients/${encodeURIComponent(client.dossier_id)}/tasks`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const tasks = await res.json();
      renderTasks(tasks);
    } catch (err) {
      tasksContainer.innerHTML = `<p class="error-msg">Erreur lors du chargement des tâches : ${err.message}</p>`;
    }
  }

  function renderTasks(tasks) {
    if (tasks.length === 0) {
      tasksContainer.innerHTML = '<p class="empty-state">Aucune tâche ce mois-ci.</p>';
      return;
    }

    // Group by project
    const byProject = {};
    tasks.forEach(t => {
      const p = t.projectLabel || 'Sans projet';
      if (!byProject[p]) byProject[p] = [];
      byProject[p].push(t);
    });

    const list = document.createElement('div');
    list.className = 'tasks-list';

    Object.entries(byProject).forEach(([project, ptasks]) => {
      const section = document.createElement('div');
      section.style.cssText = 'margin-bottom:4px';
      section.innerHTML = `<p style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#6b778c;margin-bottom:6px">${esc(project)}</p>`;

      ptasks.forEach(t => {
        const cls = badgeClass(t.statut);
        const card = document.createElement('div');
        card.className = `task-card statut-${cls}`;
        card.innerHTML = `
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
            <h4>${esc(t.taskLabel)}</h4>
            <span class="badge badge-${cls}">${esc(badgeLabel(t.statut))}</span>
          </div>
          <div class="meta">
            <span>📅 ${formatDate(t.startDate)} → ${formatDate(t.endDate)}</span>
            ${t.agents && t.agents.length ? `<span>👤 ${t.agents.map(esc).join(', ')}</span>` : ''}
          </div>
        `;
        section.appendChild(card);
      });

      list.appendChild(section);
    });

    tasksContainer.innerHTML = '';
    tasksContainer.appendChild(list);
  }

  // ── Back button ───────────────────────────────────────────────────────────

  document.getElementById('back-btn').addEventListener('click', () => {
    taskView.style.display = 'none';
    clientView.style.display = 'block';
  });

  // ── Utils ─────────────────────────────────────────────────────────────────

  function esc(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Boot ──────────────────────────────────────────────────────────────────

  loadClients();
</script>
</body>
</html>
